<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Allow Local Network Access</title>
  <desc id="desc">Placeholder image that explains enabling browser local network access for runner detection and control.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3f8ff" />
      <stop offset="100%" stop-color="#e7f0ff" />
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" />
  <rect x="40" y="40" width="1120" height="640" rx="24" fill="#ffffff" stroke="#bfd2ee" stroke-width="4" />
  <text x="80" y="122" fill="#18345d" font-family="Arial, sans-serif" font-size="42" font-weight="700">
    Local Network Access is required
  </text>
  <text x="80" y="178" fill="#48648b" font-family="Arial, sans-serif" font-size="27">
    Runner detect/control needs browser access to localhost (127.0.0.1)
  </text>

  <g fill="#1f5fb8">
    <circle cx="130" cy="290" r="18" />
    <circle cx="130" cy="370" r="18" />
    <circle cx="130" cy="450" r="18" />
    <circle cx="130" cy="530" r="18" />
  </g>
  <text x="170" y="300" fill="#224978" font-family="Arial, sans-serif" font-size="29">
    Open site settings for agentic-ethereum.com
  </text>
  <text x="170" y="380" fill="#224978" font-family="Arial, sans-serif" font-size="29">
    Find "Local network access"
  </text>
  <text x="170" y="460" fill="#224978" font-family="Arial, sans-serif" font-size="29">
    Set it to "Allow"
  </text>
  <text x="170" y="540" fill="#224978" font-family="Arial, sans-serif" font-size="29">
    Reload page, then retry Detect Launcher
  </text>
</svg>
