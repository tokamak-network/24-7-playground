name: Runner Binary Release

on:
  push:
    branches:
      - "main"
    paths:
      - "apps/runner/package.json"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (for example, v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

# Required GitHub repository secrets for macOS signing/notarization:
# - APPLE_CERT_P12_BASE64
# - APPLE_CERT_PASSWORD
# - APPLE_SIGN_IDENTITY
# - APPLE_KEYCHAIN_PASSWORD
# - APPSTORE_CONNECT_KEY_ID
# - APPSTORE_CONNECT_ISSUER_ID
# - APPSTORE_CONNECT_API_KEY_BASE64

jobs:
  detect:
    name: Detect Release Target
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name || '' }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -z "${INPUT_TAG_NAME}" ]]; then
              echo "workflow_dispatch requires tag_name input"
              exit 1
            fi
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${INPUT_TAG_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_version="$(node -p "require('./apps/runner/package.json').version")"
          current_tag="v${current_version}"

          previous_version=""
          if [[ -n "${BEFORE_SHA}" ]] && git cat-file -e "${BEFORE_SHA}:apps/runner/package.json" 2>/dev/null; then
            previous_version="$(git show "${BEFORE_SHA}:apps/runner/package.json" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>process.stdout.write(String(JSON.parse(s).version||'')))")"
          fi

          if [[ -n "${previous_version}" ]]; then
            is_increased="$(node -e "const prev=process.argv[1];const curr=process.argv[2];const parse=(v)=>{if(!/^\\d+\\.\\d+\\.\\d+$/.test(v)) return null;return v.split('.').map(Number);};const p=parse(prev), c=parse(curr);if(!p||!c){console.log('invalid');process.exit(0);}if(c[0]!==p[0]){console.log(c[0]>p[0]?'yes':'no');process.exit(0);}if(c[1]!==p[1]){console.log(c[1]>p[1]?'yes':'no');process.exit(0);}if(c[2]!==p[2]){console.log(c[2]>p[2]?'yes':'no');process.exit(0);}console.log('equal');" "${previous_version}" "${current_version}")"

            if [[ "${is_increased}" == "invalid" ]]; then
              echo "Runner package versions must follow x.y.z for auto-release comparison."
              echo "previous=${previous_version}, current=${current_version}"
              exit 1
            fi
            if [[ "${is_increased}" != "yes" ]]; then
              echo "Runner version did not increase: previous=${previous_version}, current=${current_version}"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "tag_name=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${current_tag}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${current_tag}; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=${current_tag}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node18-linux-x64
            output_name: tokamak-runner-linux-x64
            label: linux-x64
          - os: macos-latest
            target: node18-macos-arm64
            output_name: tokamak-runner-macos-arm64
            label: macos-arm64
          - os: windows-latest
            target: node18-win-x64
            output_name: tokamak-runner-win-x64.exe
            label: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate embedded prompt assets
        run: npm -w apps/runner run generate:prompt-assets

      - name: Build runner binary
        run: npx pkg@5.8.1 apps/runner --targets ${{ matrix.target }} --output apps/runner/dist/${{ matrix.output_name }}

      - name: Validate macOS signing secrets
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          for key in APPLE_CERT_P12_BASE64 APPLE_CERT_PASSWORD APPLE_SIGN_IDENTITY APPLE_KEYCHAIN_PASSWORD; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Import Apple signing certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/apple_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/runner-signing.keychain-db"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Codesign macOS binary
        if: matrix.os == 'macos-latest'
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          BINARY_PATH="apps/runner/dist/${{ matrix.output_name }}"
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGN_IDENTITY" "$BINARY_PATH"
          codesign --verify --strict --verbose=2 "$BINARY_PATH"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ matrix.label }}
          path: apps/runner/dist/${{ matrix.output_name }}
          if-no-files-found: error

  publish:
    name: Publish Release Assets
    runs-on: macos-latest
    needs: [detect, build]
    if: needs.detect.outputs.should_release == 'true'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Validate notarization secrets
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          for key in APPSTORE_CONNECT_KEY_ID APPSTORE_CONNECT_ISSUER_ID APPSTORE_CONNECT_API_KEY_BASE64; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Build notarization bundle for macOS binary
        run: |
          set -euo pipefail
          MAC_BINARY_PATH="$(find dist -type f -name 'tokamak-runner-macos-arm64' | head -n 1)"
          if [[ -z "${MAC_BINARY_PATH}" ]]; then
            echo "Unable to find macOS binary artifact."
            exit 1
          fi
          ditto -c -k --keepParent "$MAC_BINARY_PATH" dist/tokamak-runner-macos-arm64.zip

      - name: Submit macOS binary for notarization
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8"
          echo "$APPSTORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          xcrun notarytool submit dist/tokamak-runner-macos-arm64.zip \
            --key "$API_KEY_PATH" \
            --key-id "$APPSTORE_CONNECT_KEY_ID" \
            --issuer "$APPSTORE_CONNECT_ISSUER_ID" \
            --wait

      - name: Remove raw macOS binary from release assets
        run: |
          set -euo pipefail
          find dist -type f -name 'tokamak-runner-macos-arm64' -delete

      - name: Build checksums
        run: |
          find dist -type f | LC_ALL=C sort | xargs shasum -a 256 > dist/SHA256SUMS.txt

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/**/*
