name: Runner npm Publish

on:
  push:
    branches:
      - "main"
    paths:
      - "apps/runner/package.json"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  detect:
    name: Detect Publish Target
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      package_name: ${{ steps.resolve.outputs.package_name }}
      package_version: ${{ steps.resolve.outputs.package_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package publish target
        id: resolve
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./apps/runner/package.json').name")"
          package_version="$(node -p "require('./apps/runner/package.json').version")"
          npm_latest_version="$(npm view "${package_name}" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
          if [[ -z "${npm_latest_version}" ]]; then
            npm_latest_version="0.0.0"
          fi

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "npm_latest_version=${npm_latest_version}" >> "$GITHUB_OUTPUT"

          is_higher_than_npm="$(node -e "const latest=process.argv[1];const current=process.argv[2];const parse=(v)=>{if(!/^\\d+\\.\\d+\\.\\d+$/.test(v)) return null;return v.split('.').map(Number);};const l=parse(latest), c=parse(current);if(!l||!c){console.log('invalid');process.exit(0);}if(c[0]!==l[0]){console.log(c[0]>l[0]?'yes':'no');process.exit(0);}if(c[1]!==l[1]){console.log(c[1]>l[1]?'yes':'no');process.exit(0);}if(c[2]!==l[2]){console.log(c[2]>l[2]?'yes':'no');process.exit(0);}console.log('equal');" "${npm_latest_version}" "${package_version}")"

          if [[ "${is_higher_than_npm}" == "invalid" ]]; then
            echo "Runner package versions must follow x.y.z for npm comparison."
            echo "npm_latest=${npm_latest_version}, current=${package_version}"
            exit 1
          fi

          if [[ "${is_higher_than_npm}" != "yes" ]]; then
            echo "Runner version is not higher than npm latest: npm_latest=${npm_latest_version}, current=${package_version}"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish npm package
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate embedded prompt assets
        run: npm -w apps/runner run generate:prompt-assets

      - name: Validate package contents (dry-run)
        run: npm pack --workspace apps/runner --dry-run

      - name: Check package version on npm registry
        id: npm_check
        env:
          PACKAGE_NAME: ${{ needs.detect.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.detect.outputs.package_version }}
        run: |
          set -euo pipefail
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
            echo "Package version already exists on npm. Skipping publish."
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.already_exists != 'true'
        run: npm publish --workspace apps/runner --access public --provenance --registry=https://registry.npmjs.org
